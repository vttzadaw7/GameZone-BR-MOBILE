<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">GameZone BR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="assets/js/data.js"></script>
  <style>
    body { 
      background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%); 
      color: #e0f0ff; 
    }
    .neon-blue { 
      text-shadow: 0 0 15px #00b3ff, 0 0 25px #0099ff;
      color: #00b3ff;
    }
  </style>
</head>
<body class="min-h-screen">

  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md border-b border-cyan-500/30 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-bold neon-blue">𝘎𝘢𝘮𝘦𝘡𝘰𝘯𝘦 𝘉𝘙</a>
      <a href="index.html" class="hover:text-cyan-400 text-lg">← Voltar</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 pt-28" id="content"></div>

  <footer class="text-center py-12 text-zinc-500">
    GameZone BR © 2026 • Portal de Emulação Mobile 🔥
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const emuName = urlParams.get('emu') || "NetherSX2";

    if (typeof emuladoresData === "undefined") {
      document.getElementById('content').innerHTML = `<p class="text-red-400 text-center text-xl">Erro ao carregar dados. Tente recarregar.</p>`;
    } else {
      const data = emuladoresData[emuName];
      if (!data) {
        document.getElementById('content').innerHTML = `<p class="text-red-400 text-center">Emulador não encontrado</p>`;
      } else {
        let html = `
          <div class="text-center pb-10">
            <img src="\( {data.imagem}" class="mx-auto h-48 drop-shadow-2xl mb-6" alt=" \){data.nome}">
            <h1 class="text-4xl font-bold neon-blue">${data.nome}</h1>
            <p class="text-xl text-cyan-300">${data.categoria}</p>
          </div>

          <div class="space-y-12">
            <section>
              <h2 class="text-2xl font-bold mb-4">Sobre</h2>
              <p class="text-lg">${data.descricao}</p>
            </section>

            <section class="bg-zinc-950/70 rounded-3xl p-8">
              <h2 class="text-2xl font-bold mb-6">Requisitos</h2>
              \( {data.requisitos.map(r => `<div class="flex gap-3 mb-3"><span>✅</span><span> \){r}</span></div>`).join('')}
            </section>

            <section class="bg-zinc-950/70 rounded-3xl p-8">
              <h2 class="text-2xl font-bold mb-6">Melhor Configuração</h2>
              ${data.configuracao.map(c => `<div class="py-3">🎯 ${c}</div>`).join('')}
            </section>

            <section>
              <h2 class="text-2xl font-bold mb-6">10 Jogos Recomendados</h2>
              <div class="grid grid-cols-2 gap-3">
                \( {data.jogos.map(j => `<div class="bg-zinc-900 p-4 rounded-2xl text-center"> \){j}</div>`).join('')}
              </div>
            </section>
          </div>
        `;
        document.getElementById('content').innerHTML = html;
      }
    }
  </script>
</body>
</html>
