<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">GameZone BR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="assets/js/data.js"></script>
  <style>
    body { 
      background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%); 
      color: #e0f0ff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .neon-blue { 
      text-shadow: 0 0 20px #00f0ff, 0 0 40px #00aaff;
    }
  </style>
</head>
<body class="min-h-screen">

  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md border-b border-cyan-500/30 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-bold neon-blue">𝘎𝘢𝘮𝘦𝘡𝘰𝘯𝘦 𝘉𝘙</a>
      <a href="index.html" class="hover:text-cyan-400">← Voltar</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 pt-28" id="content">
    <div class="text-center py-20">
      <p class="text-xl text-cyan-400">Carregando emulador...</p>
    </div>
  </div>

  <footer class="text-center py-12 text-zinc-500 mt-20">
    GameZone BR © 2026 • Portal de Emulação Mobile 🔥
  </footer>

  <script>
    // Espera um pouco para garantir que data.js carregou
    setTimeout(() => {
      const urlParams = new URLSearchParams(window.location.search);
      const emuName = urlParams.get('emu') || "NetherSX2";

      console.log("Tentando carregar:", emuName); // Para debug

      if (typeof emuladoresData === "undefined") {
        document.getElementById('content').innerHTML = `
          <h1 class="text-center text-red-400 text-2xl">Erro: data.js não carregou</h1>
        `;
      } else {
        const data = emuladoresData[emuName];
        if (!data) {
          document.getElementById('content').innerHTML = `<h1 class="text-center text-red-400">Emulador não encontrado</h1>`;
        } else {
          let html = `
            <div class="text-center pb-12">
              <img src="\( {data.imagem}" class="mx-auto h-52 drop-shadow-2xl mb-6 rounded-2xl" alt=" \){data.nome}">
              <h1 class="text-5xl font-bold neon-blue">${data.nome}</h1>
              <p class="text-2xl text-cyan-300 mt-2">${data.categoria}</p>
            </div>

            <div class="grid lg:grid-cols-12 gap-10">
              <div class="lg:col-span-8 space-y-16">
                <section>
                  <h2 class="text-3xl font-bold mb-6">Sobre</h2>
                  <p class="text-lg text-zinc-300">${data.descricao}</p>
                </section>

                <section class="bg-zinc-950/70 rounded-3xl p-8">
                  <h2 class="text-3xl font-bold mb-8">Requisitos</h2>
                  \( {data.requisitos.map(r => `<div class="flex items-center gap-3 mb-4 text-lg"><span class="text-2xl">✅</span><span> \){r}</span></div>`).join('')}
                </section>

                <section class="bg-zinc-950/70 rounded-3xl p-8">
                  <h2 class="text-3xl font-bold mb-8">Melhor Configuração</h2>
                  ${data.configuracao.map(c => `<div class="py-4 border-b border-zinc-700 text-lg">🎯 ${c}</div>`).join('')}
                </section>

                <section>
                  <h2 class="text-3xl font-bold mb-8">10 Jogos Recomendados</h2>
                  <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    \( {data.jogos.map(j => `<div class="bg-zinc-900 p-5 rounded-2xl text-center text-lg"> \){j}</div>`).join('')}
                  </div>
                </section>
              </div>
            </div>
          `;
          document.getElementById('content').innerHTML = html;
        }
      }
    }, 300);
  </script>
</body>
</html>
