<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameZone BR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0a1f; color: #e0f0ff; }
    .neon { text-shadow: 0 0 20px #00f0ff; }
  </style>
</head>
<body class="min-h-screen p-4">

  <h1 class="text-4xl font-bold text-center neon mb-8">𝘎𝘢𝘮𝘦𝘡𝘰𝘯𝘦 𝘉𝘙</h1>

  <div class="max-w-6xl mx-auto" id="emuladores-grid">
    <!-- JS vai preencher -->
  </div>

  <script>
    const emuladoresData = {
      "NetherSX2": { nome: "NetherSX2", categoria: "PlayStation 2", desc: "Melhor emulador de PS2", imagem: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/PS2_logo.svg/480px-PS2_logo.svg.png" },
      "PPSSPP": { nome: "PPSSPP", categoria: "PlayStation Portable", desc: "Emulador de PSP", imagem: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/PPSSPP_logo.svg/480px-PPSSPP_logo.svg.png" },
      "Vita3K": { nome: "Vita3K", categoria: "PlayStation Vita", desc: "Emulador de PS Vita", imagem: "https://i.ibb.co/0vX9kLm/vita3k-logo.png" }
    };

    const grid = document.getElementById('emuladores-grid');
    Object.keys(emuladoresData).forEach(key => {
      const e = emuladoresData[key];
      const card = document.createElement('div');
      card.className = "bg-zinc-900 p-5 rounded-3xl mb-6";
      card.innerHTML = `
        <img src="${e.imagem}" class="h-20 mx-auto mb-4">
        <h2 class="text-2xl font-bold">${e.nome}</h2>
        <p class="text-cyan-400">${e.categoria}</p>
        <p class="text-gray-400 mt-2">${e.desc}</p>
        <a href="emulador.html?emu=${key}" class="block mt-4 py-3 bg-cyan-500 text-black text-center font-bold rounded-2xl">Ver Detalhes</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
